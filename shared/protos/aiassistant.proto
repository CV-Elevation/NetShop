syntax = "proto3";
package aiassistant;
option go_package = "kuoz/netshop/platform/shared/proto/aiassistant";
import "common.proto";

service AiAssistantService {
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc ChatStream(ChatRequest) returns (stream ChatChunk);
}

message Message {
  string role    = 1; // "user" / "assistant"
  string content = 2;
}

message ChatRequest {
  string           session_id = 1;
  string           user_id    = 2;
  string           message    = 3;
  repeated Message history    = 4; // 最近 N 条上下文
}

message ChatResponse {
  string                   text       = 1;
  repeated ToolCall        tool_calls = 2;
  repeated common.Product  products   = 3;
}

message ChatChunk {
  string                  chunk_type = 1; // "text" / "tool_status" / "products" / "done"
  string                  delta      = 2;
  bool                    done       = 3;
  ToolCall                tool_call  = 4; // 工具执行状态推送
  repeated common.Product products   = 5; // chunk_type="products" 时携带
}

message ToolCall {
  string tool_name = 1; // "search_products" / "query_faq"
  string status    = 2; // "running" / "done" / "error"
  string summary   = 3; // 执行结果摘要
}