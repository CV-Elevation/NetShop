syntax = "proto3";
package aiassistant;
option go_package = "github.com/yourname/platform/shared/proto/aiassistant";

import "common.proto";

service AiAssistantService {
  // 普通对话（一次性返回完整回复）
  rpc Chat(ChatRequest) returns (ChatResponse);

  // 流式对话（打字机效果，推荐用于前端）
  rpc ChatStream(ChatRequest) returns (stream ChatChunk);
}

// ── Chat / ChatStream 共用请求 ─────────────────
message ChatRequest {
  string session_id = 1; // 会话 ID，用于关联上下文，前端生成 UUID
  string user_id    = 2;
  string message    = 3; // 用户输入
}

// ── Chat 普通响应 ──────────────────────────────
message ChatResponse {
  string           text         = 1; // AI 回复文本
  repeated ToolCall tool_calls  = 2; // 本次调用了哪些工具（透传给前端展示）
  repeated common.Product products = 3; // 如果涉及商品推荐，直接返回商品列表
}

// ── ChatStream 流式响应（逐 chunk 返回）─────────
message ChatChunk {
  string delta     = 1; // 增量文本片段
  bool   done      = 2; // 是否结束
  // 最后一个 chunk（done=true）时携带完整商品列表
  repeated common.Product products = 3;
}

// ── 工具调用记录（透明给前端） ─────────────────
message ToolCall {
  string tool_name = 1; // "search_products" / "get_order" / "query_faq"
  string summary   = 2; // 工具执行结果摘要，用于前端展示"正在查询..."
}
