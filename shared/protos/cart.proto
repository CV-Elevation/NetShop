syntax = "proto3";
package cart;
option go_package = "kuoz/netshop/platform/shared/proto/cart";

import "common.proto";

service CartService {
  // 添加商品到购物车
  rpc AddItem(AddItemRequest) returns (AddItemResponse);

  // 查询购物车
  rpc GetCart(GetCartRequest) returns (GetCartResponse);

  // 清空购物车（结算完成后调用）
  rpc ClearCart(ClearCartRequest) returns (common.Empty);
}

// ── AddItem ───────────────────────────────────
message AddItemRequest {
  string user_id    = 1;
  string product_id = 2;
  int32  quantity   = 3;
}

message AddItemResponse {
  CartItem item        = 1; // 返回添加后的购物车条目
  int32    total_items = 2; // 购物车当前总条目数
}

// ── GetCart ───────────────────────────────────
message GetCartRequest {
  string user_id = 1;
}

message GetCartResponse {
  repeated CartItem  items       = 1;
  common.Money       total_price = 2; // 所有商品合计
  int32              total_count  = 3; // 购物车商品总数
  bool               has_invalid  = 4; // 是否存在库存问题的商品（方便前端显示全局提示）
}

// ── ClearCart ─────────────────────────────────
message ClearCartRequest {
  string user_id = 1;
}

// ── 购物车条目 ─────────────────────────────────
enum StockStatus {
  STOCK_STATUS_UNKNOWN     = 0;
  IN_STOCK                 = 1; // 库存充足
  LOW_STOCK                = 2; // 库存紧张（比如 < 10件）
  INSUFFICIENT             = 3; // 库存不足（少于用户选择的数量）
  OUT_OF_STOCK             = 4; // 完全售罄
}

message CartItem {
  string       product_id   = 1;
  string       name         = 2;
  common.Money price        = 3;
  int32        quantity     = 4;
  common.Money subtotal     = 5;
  string       image_url    = 6;

  // 库存相关
  StockStatus  stock_status = 7; // 库存状态
  int32        stock_count  = 8; // 当前可用库存数量
  bool         checked      = 9; // 是否勾选（用于部分结算）
}
