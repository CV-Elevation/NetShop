<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NetShop Gateway Home</title>
  <style>
    :root {
      --bg: #fff8ef;
      --panel: #fffdf9;
      --ink: #2f2317;
      --accent: #2d6a4f;
      --accent-soft: #b8d8c9;
      --line: #e8dbca;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.4), rgba(255,255,255,0.8)),
        repeating-linear-gradient(-30deg, #f9ead7 0, #f9ead7 16px, #f3dfc5 16px, #f3dfc5 32px);
      padding: 24px;
    }
    .shell {
      max-width: 780px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 14px 34px rgba(56, 34, 13, 0.12);
      animation: fadein 450ms ease;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 2.8vw, 2.4rem);
    }
    .meta {
      margin-top: 12px;
      color: #574537;
      line-height: 1.65;
    }
    .chip {
      margin-top: 18px;
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #18452f;
      font-weight: 700;
      font-size: 0.9rem;
    }
    form {
      margin-top: 26px;
    }
    button {
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      padding: 10px 18px;
      cursor: pointer;
    }
    @keyframes fadein {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>Welcome, {{.Nickname}}</h1>
    <p class="meta">User ID: {{.UserID}}</p>
    <p class="meta">Email: {{if .Email}}{{.Email}}{{else}}(no public email returned by GitHub){{end}}</p>
    <span class="chip">JWT session is active</span>
    <form method="post" action="/logout">
      <button type="submit">Log out</button>
    </form>
  </main>
</body>
</html>
