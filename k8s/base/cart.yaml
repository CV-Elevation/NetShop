apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      containers:
        - name: cart
          image: netshop/cart:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50056
              name: grpc
          env:
            - name: CART_GRPC_ADDR
              value: ":50056"
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: netshop-config
                  key: REDIS_ADDR
            - name: PRODUCT_GRPC_ADDR
              valueFrom:
                configMapKeyRef:
                  name: netshop-config
                  key: PRODUCT_GRPC_ADDR
          readinessProbe:
            tcpSocket:
              port: 50056
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 50056
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cart
spec:
  selector:
    app: cart
  ports:
    - name: grpc
      port: 50056
      targetPort: 50056
