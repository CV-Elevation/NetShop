apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: netshop/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: ":8080"
            - name: USER_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: netshop-config
                  key: USER_SERVICE_ADDR
            - name: EMAIL_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: netshop-config
                  key: EMAIL_SERVICE_ADDR
            - name: PRODUCT_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: netshop-config
                  key: PRODUCT_SERVICE_ADDR
            - name: RECOMMEND_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: netshop-config
                  key: RECOMMEND_SERVICE_ADDR
            - name: AD_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: netshop-config
                  key: AD_SERVICE_ADDR
            - name: CART_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: netshop-config
                  key: CART_SERVICE_ADDR
            - name: AIASSISTANT_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: netshop-config
                  key: AIASSISTANT_SERVICE_ADDR
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: netshop-secret
                  key: JWT_SECRET
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: netshop-secret
                  key: GITHUB_CLIENT_ID
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: netshop-secret
                  key: GITHUB_CLIENT_SECRET
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
