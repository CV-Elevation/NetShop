apiVersion: apps/v1
kind: Deployment
metadata:
  name: product
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product
  template:
    metadata:
      labels:
        app: product
    spec:
      containers:
        - name: product
          image: netshop/product:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50053
              name: grpc
          env:
            - name: PRODUCT_GRPC_ADDR
              value: ":50053"
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: netshop-config
                  key: DATABASE_URL
          readinessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: product
spec:
  selector:
    app: product
  ports:
    - name: grpc
      port: 50053
      targetPort: 50053
