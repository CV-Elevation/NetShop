apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - ingress.yaml
patches:
  - path: configmap-dev.patch.yaml
secretGenerator:
  - name: netshop-secret
    behavior: replace
    envs:
      - secret-dev.local.env
generatorOptions:
  disableNameSuffixHash: true
