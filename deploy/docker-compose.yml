version: "3.9"

# ══════════════════════════════════════════════════════════════
# NetShop 本地开发基础设施
#
# 包含：
#   - PostgreSQL 16 + pgvector  → 业务数据 + AI 向量存储
#   - Redis 7                   → 缓存、会话、购物车
#   - Kafka + Kafka UI          → 消息队列 + 可视化管理
#
# 使用方式：
#   启动：docker-compose up -d
#   停止：docker-compose down
#   清空数据：docker-compose down -v
# ══════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL + pgvector ────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16        # 官方镜像，内置 pgvector
    container_name: netshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: netshop
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: netshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql  # 自动初始化
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netshop"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: netshop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes   # 开启 AOF 持久化，重启不丢数据
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Kafka ────────────────────────────────────────────────────
  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: netshop-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # KRaft 模式（不需要 ZooKeeper）
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"   # 自动创建 topic，开发方便
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Kafka UI（可视化管理 Kafka）──────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: netshop-kafka-ui
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: netshop-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

# ── 数据持久化卷 ─────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  kafka_data:
